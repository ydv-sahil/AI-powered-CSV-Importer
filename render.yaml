# Render blueprint. In the Render dashboard: New -> Blueprint -> pick this repo.
#
# GEMINI_API_KEY is deliberately `sync: false` — Render will prompt for it in the
# dashboard rather than reading it from this file. Never commit a key.
#
# CORS_ORIGIN must be set to the deployed frontend's origin once Vercel has given
# you a URL. Leaving it as `*` works but lets any site call your API.

services:
  - type: web
    name: groweasy-csv-importer-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: BATCH_SIZE
        value: 25
      - key: BATCH_CONCURRENCY
        value: 2
